<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - 会议接待助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 35%, #90caf9 100%);
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.9) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.8) 0%, transparent 45%),
                linear-gradient(180deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.3) 100%);
            pointer-events: none;
            filter: blur(1px);
        }
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }
        .container {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.08),
                0 8px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            position: relative;
            z-index: 1;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #2c3e50;
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(200, 200, 200, 0.6);
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.8);
        }
        .form-group input:focus {
            outline: none;
            border-color: #90a4ae;
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 0 0 3px rgba(120, 144, 156, 0.15);
        }
        .btn {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, #b0bec5 0%, #90a4ae 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(144, 164, 174, 0.25);
        }
        .btn:hover {
            background: linear-gradient(135deg, #90caf9 0%, #64b5f6 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(100, 181, 246, 0.35);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .message {
            font-size: 14px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
            padding: 10px;
            border-radius: 6px;
        }
        .message.success {
            color: #27ae60;
            background: rgba(39, 174, 96, 0.1);
            display: block;
        }
        .message.error {
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
            display: block;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
        .back-link a {
            color: #78909c;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link a:hover {
            text-decoration: underline;
            color: #90a4ae;
        }
        .error-container {
            text-align: center;
            padding: 20px;
        }
        .error-container h2 {
            color: #e74c3c;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="header">
            <h1>重置密码</h1>
            <p id="subtitle">请输入您的新密码</p>
        </div>
        <div class="message" id="message"></div>
        <form id="resetForm" style="display: none;">
            <div class="form-group">
                <label for="newPassword">新密码</label>
                <input type="password" id="newPassword" name="newPassword" required placeholder="请输入新密码（至少6位）" minlength="6">
            </div>
            <div class="form-group">
                <label for="confirmPassword">确认密码</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="请再次输入新密码" minlength="6">
            </div>
            <button type="submit" class="btn" id="submitBtn">重置密码</button>
        </form>
        <div class="back-link">
            <a href="/static/login.html">返回登录</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        async function verifyToken() {
            if (!token) {
                showError('无效的重置链接');
                return;
            }
            
            try {
                const response = await fetch(`/api/auth/verify-reset-token?token=${encodeURIComponent(token)}`);
                const data = await response.json();
                
                if (data.valid) {
                    document.getElementById('subtitle').textContent = `用户: ${data.username}`;
                    document.getElementById('resetForm').style.display = 'block';
                } else {
                    showError(data.message || '无效的重置链接');
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
            }
        }
        
        function showError(msg) {
            document.getElementById('mainContainer').innerHTML = `
                <div class="error-container">
                    <h2>错误</h2>
                    <p>${msg}</p>
                </div>
                <div class="back-link">
                    <a href="/static/login.html">返回登录</a>
                </div>
            `;
        }
        
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            const message = document.getElementById('message');
            
            if (newPassword !== confirmPassword) {
                message.textContent = '两次输入的密码不一致';
                message.className = 'message error';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = '重置中...';
            message.className = 'message';
            message.style.display = 'none';
            
            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        token: token, 
                        new_password: newPassword 
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    message.textContent = data.message || '密码重置成功';
                    message.className = 'message success';
                    document.getElementById('resetForm').style.display = 'none';
                    
                    setTimeout(() => {
                        window.location.href = '/static/login.html';
                    }, 2000);
                } else {
                    message.textContent = data.detail || '重置失败';
                    message.className = 'message error';
                }
            } catch (error) {
                message.textContent = '网络错误，请稍后重试';
                message.className = 'message error';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '重置密码';
            }
        });
        
        verifyToken();
    </script>
</body>
</html>
