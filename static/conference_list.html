<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会议管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }
        
        .btn {
            padding: 8px 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            background: #fff;
            color: #333;
        }
        
        .btn:hover {
            background: #f0f0f0;
            border-color: #bbb;
        }
        
        .btn-primary:hover {
            background: #e8f4fc;
            border-color: #4a90d9;
            color: #4a90d9;
        }
        
        .btn-secondary:hover {
            background: #f5f5f5;
            border-color: #999;
            color: #666;
        }
        
        .btn-danger:hover {
            background: #fce8e8;
            border-color: #d9534f;
            color: #d9534f;
        }
        
        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }
        
        .conference-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }
        
        .conference-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.2s;
        }
        
        .conference-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        
        .card-code {
            font-size: 12px;
            color: #999;
        }
        
        .card-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-active {
            background: #e6f7ff;
            color: #1890ff;
        }
        
        .status-ended {
            background: #f5f5f5;
            color: #999;
        }
        
        .status-upcoming {
            background: #fff7e6;
            color: #fa8c16;
        }
        
        .card-body {
            margin-bottom: 16px;
        }
        
        .info-row {
            display: flex;
            align-items: center;
            padding: 6px 0;
            font-size: 13px;
        }
        
        .info-icon {
            width: 20px;
            margin-right: 8px;
            text-align: center;
        }
        
        .info-label {
            color: #999;
            min-width: 60px;
        }
        
        .info-value {
            color: #333;
        }
        
        .card-footer {
            display: flex;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
        }
        
        .card-footer .btn {
            flex: 1;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .empty-text {
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow: hidden;
        }
        
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h3 {
            font-size: 16px;
            font-weight: 600;
        }
        
        .modal-close {
            width: 32px;
            height: 32px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .modal-body {
            padding: 20px;
            max-height: 60vh;
            overflow-y: auto;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }
        
        .form-group label .required {
            color: #e74c3c;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #5c9ce6;
            box-shadow: 0 0 0 3px rgba(120, 144, 156, 0.1);
        }
        
        .date-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .checkbox-group {
            display: flex;
            gap: 16px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .checkbox-item input {
            width: 16px;
            height: 16px;
        }
        
        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .toast.show {
            opacity: 1;
        }

        .confirm-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .confirm-modal.active {
            display: flex;
        }

        .confirm-content {
            background: white;
            border-radius: 12px;
            padding: 24px;
            width: 280px;
            text-align: center;
        }

        .confirm-message {
            font-size: 15px;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.5;
            white-space: pre-line;
        }

        .confirm-buttons {
            display: flex;
            gap: 12px;
        }

        .confirm-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }

        .confirm-btn.cancel {
            background: #f0f0f0;
            color: #666;
        }

        .confirm-btn.ok {
            background: #5c9ce6;
            color: white;
        }

        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            background: #fff;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 50%;
            font-size: 28px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 80;
        }

        .fab:hover {
            background: #f0f0f0;
            border-color: #bbb;
        }
    </style>
</head>
<body>
    <div id="conferenceList" class="conference-grid">
        <div class="loading">加载中...</div>
    </div>
    
    <button class="fab" onclick="showCreateModal()">+</button>
    
    <div class="modal-overlay" id="createModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">新建会议</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="conferenceForm">
                    <input type="hidden" id="editId">
                    <div class="form-group">
                        <label>会议名称 <span class="required">*</span></label>
                        <input type="text" id="title" required placeholder="请输入会议名称">
                    </div>
                    <div class="form-group">
                        <label>会议规模（人数） <span class="required">*</span></label>
                        <input type="number" id="scale" required min="1" placeholder="请输入参会人数">
                    </div>
                    <div class="form-group">
                        <label>会议日期 <span class="required">*</span></label>
                        <div class="date-row">
                            <input type="date" id="startDate" required>
                            <input type="date" id="endDate" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>会议地点</label>
                        <input type="text" id="location" placeholder="请输入会议地点">
                    </div>
                    <div class="form-group">
                        <label>会议目的</label>
                        <textarea id="purpose" rows="2" placeholder="请输入会议目的"></textarea>
                    </div>
                    <div class="form-group">
                        <label>服务配置</label>
                        <div class="checkbox-group">
                            <div class="checkbox-item">
                                <input type="checkbox" id="hasMeal">
                                <label for="hasMeal">用餐</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="hasHotel">
                                <label for="hasHotel">住宿</label>
                            </div>
                            <div class="checkbox-item">
                                <input type="checkbox" id="hasTransport">
                                <label for="hasTransport">接送</label>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveConference()">保存</button>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <div class="confirm-modal" id="confirmModal">
        <div class="confirm-content">
            <div class="confirm-message" id="confirmMessage"></div>
            <div class="confirm-buttons">
                <button class="confirm-btn cancel" id="confirmCancel">取消</button>
                <button class="confirm-btn ok" id="confirmOk">确定</button>
            </div>
        </div>
    </div>

    <script>
        let conferences = [];
        
        function getHeaders() {
            const token = localStorage.getItem('token');
            return {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            };
        }
        
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.parent.location.href = '/login.html';
                return false;
            }
            return true;
        }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function showConfirm(message) {
            return new Promise((resolve) => {
                const modal = document.getElementById('confirmModal');
                const msgEl = document.getElementById('confirmMessage');
                const okBtn = document.getElementById('confirmOk');
                const cancelBtn = document.getElementById('confirmCancel');
                
                msgEl.textContent = message;
                modal.classList.add('active');
                
                const handleOk = () => {
                    modal.classList.remove('active');
                    okBtn.removeEventListener('click', handleOk);
                    cancelBtn.removeEventListener('click', handleCancel);
                    resolve(true);
                };
                
                const handleCancel = () => {
                    modal.classList.remove('active');
                    okBtn.removeEventListener('click', handleOk);
                    cancelBtn.removeEventListener('click', handleCancel);
                    resolve(false);
                };
                
                okBtn.addEventListener('click', handleOk);
                cancelBtn.addEventListener('click', handleCancel);
            });
        }
        
        async function loadConferences() {
            try {
                const resp = await fetch('/api/conferences/', { headers: getHeaders() });
                if (resp.status === 401) {
                    window.parent.location.href = '/login.html';
                    return;
                }
                conferences = await resp.json();
                renderConferences();
            } catch (e) {
                console.error('加载会议列表失败', e);
                document.getElementById('conferenceList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚠️</div>
                        <div class="empty-text">加载失败，请刷新重试</div>
                    </div>
                `;
            }
        }
        
        function getStatus(conference) {
            const today = new Date().toISOString().split('T')[0];
            const start = conference.start_date;
            const end = conference.end_date;
            
            if (end && end < today) {
                return { text: '已结束', class: 'status-ended' };
            } else if (start && start > today) {
                return { text: '未开始', class: 'status-upcoming' };
            } else {
                return { text: '进行中', class: 'status-active' };
            }
        }
        
        function renderConferences() {
            const container = document.getElementById('conferenceList');
            
            if (conferences.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-text">暂无会议，点击右上角"新建会议"按钮创建</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = conferences.map(c => {
                const status = getStatus(c);
                return `
                    <div class="conference-card">
                        <div class="card-header">
                            <div>
                                <div class="card-title">${c.title}</div>
                                <div class="card-code">编码: ${c.code || '-'}</div>
                            </div>
                            <span class="card-status ${status.class}">${status.text}</span>
                        </div>
                        <div class="card-body">
                            <div class="info-row">
                                <span class="info-icon">👥</span>
                                <span class="info-label">规模</span>
                                <span class="info-value">${c.scale || 0} 人</span>
                            </div>
                            <div class="info-row">
                                <span class="info-icon">📅</span>
                                <span class="info-label">日期</span>
                                <span class="info-value">${c.start_date || '-'} 至 ${c.end_date || '-'}</span>
                            </div>
                            ${c.location ? `
                                <div class="info-row">
                                    <span class="info-icon">📍</span>
                                    <span class="info-label">地点</span>
                                    <span class="info-value">${c.location}</span>
                                </div>
                            ` : ''}
                            <div class="info-row">
                                <span class="info-icon">⚙️</span>
                                <span class="info-label">服务</span>
                                <span class="info-value">
                                    ${c.has_meal ? '🍽️用餐 ' : ''}
                                    ${c.has_hotel ? '🏨住宿 ' : ''}
                                    ${c.has_transport ? '🚗接送' : ''}
                                    ${!c.has_meal && !c.has_hotel && !c.has_transport ? '无' : ''}
                                </span>
                            </div>
                        </div>
                        <div class="card-footer">
                            <button class="btn btn-secondary btn-sm" onclick="editConference(${c.id})">编辑</button>
                            <button class="btn btn-primary btn-sm" onclick="enterConference(${c.id}, '${c.title}', '${c.code}')">进入</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteConference(${c.id})">删除</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function showCreateModal() {
            document.getElementById('modalTitle').textContent = '新建会议';
            document.getElementById('conferenceForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('createModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('createModal').classList.remove('active');
        }
        
        async function editConference(id) {
            const conference = conferences.find(c => c.id === id);
            if (!conference) return;
            
            document.getElementById('modalTitle').textContent = '编辑会议';
            document.getElementById('editId').value = id;
            document.getElementById('title').value = conference.title || '';
            document.getElementById('scale').value = conference.scale || '';
            document.getElementById('startDate').value = conference.start_date || '';
            document.getElementById('endDate').value = conference.end_date || '';
            document.getElementById('location').value = conference.location || '';
            document.getElementById('purpose').value = conference.purpose || '';
            document.getElementById('hasMeal').checked = conference.has_meal || false;
            document.getElementById('hasHotel').checked = conference.has_hotel || false;
            document.getElementById('hasTransport').checked = conference.has_transport || false;
            
            document.getElementById('createModal').classList.add('active');
        }
        
        async function saveConference() {
            const editId = document.getElementById('editId').value;
            const data = {
                title: document.getElementById('title').value.trim(),
                scale: parseInt(document.getElementById('scale').value) || 0,
                start_date: document.getElementById('startDate').value,
                end_date: document.getElementById('endDate').value,
                location: document.getElementById('location').value.trim(),
                purpose: document.getElementById('purpose').value.trim(),
                has_meal: document.getElementById('hasMeal').checked,
                has_hotel: document.getElementById('hasHotel').checked,
                has_transport: document.getElementById('hasTransport').checked
            };
            
            if (!data.title) {
                showToast('请输入会议名称');
                return;
            }
            if (!data.scale) {
                showToast('请输入会议规模');
                return;
            }
            if (!data.start_date || !data.end_date) {
                showToast('请选择会议日期');
                return;
            }
            
            try {
                let resp;
                if (editId) {
                    resp = await fetch(`/api/conferences/${editId}`, {
                        method: 'PUT',
                        headers: getHeaders(),
                        body: JSON.stringify(data)
                    });
                } else {
                    resp = await fetch('/api/conferences/', {
                        method: 'POST',
                        headers: getHeaders(),
                        body: JSON.stringify(data)
                    });
                }
                
                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.detail || '保存失败');
                }
                
                closeModal();
                showToast(editId ? '修改成功' : '创建成功');
                loadConferences();
            } catch (e) {
                showToast(e.message);
            }
        }
        
        async function deleteConference(id) {
            const confirmed = await showConfirm('确定要删除这个会议吗？删除后无法恢复。');
            if (!confirmed) return;
            
            try {
                const resp = await fetch(`/api/conferences/${id}`, {
                    method: 'DELETE',
                    headers: getHeaders()
                });
                
                if (!resp.ok) throw new Error('删除失败');
                
                showToast('删除成功');
                loadConferences();
            } catch (e) {
                showToast(e.message);
            }
        }
        
        function enterConference(id, title, code) {
            if (window.parent && window.parent.selectConference) {
                window.parent.selectConference(id, title, code);
                window.parent.switchPage('seating');
            }
        }
        
        if (checkAuth()) {
            loadConferences();
        }
    </script>
</body>
</html>
