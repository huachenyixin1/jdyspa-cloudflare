<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>创建会议</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 15px;
            font-size: 14px;
        }

        .container {
            max-width: 420px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4a90d9 0%, #3a7bc8 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h3 {
            font-size: 18px;
            margin: 0;
            font-weight: 500;
        }

        .form-container {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group label .required {
            color: #e74c3c;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4a90d9;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.1);
        }

        .date-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .time-group {
            margin-bottom: 12px;
        }

        .time-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .time-label {
            min-width: 50px;
            font-size: 13px;
            color: #6c757d;
        }

        .time-inputs {
            display: flex;
            flex: 1;
            gap: 4px;
            align-items: center;
        }

        .time-inputs input {
            flex: 1;
            min-width: 0;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            cursor: pointer;
        }

        .checkbox-item label {
            font-size: 13px;
            color: #555;
            cursor: pointer;
            font-weight: normal;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4a90d9 0%, #3a7bc8 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(74, 144, 217, 0.3);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #666;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #eee;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #4a90d9;
        }

        .loading .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4a90d9;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            display: none;
            padding: 16px;
            margin-top: 16px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
        }

        .result.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .result.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .result h4 {
            margin-bottom: 8px;
            font-size: 16px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #666;
        }

        .info-value {
            color: #333;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h3>创建会议</h3>
        </div>

        <div class="form-container">
            <form id="conferenceForm">
                <div class="form-group">
                    <label>会议名称 <span class="required">*</span></label>
                    <input type="text" id="title" name="title" placeholder="请输入会议名称" required>
                </div>

                <div class="form-group">
                    <label>会议规模（人数） <span class="required">*</span></label>
                    <input type="number" id="scale" name="scale" placeholder="请输入参会人数" min="1" required>
                </div>

                <div class="form-group">
                    <label>会议日期 <span class="required">*</span></label>
                    <div class="date-group">
                        <input type="date" id="startDate" name="startDate" required>
                        <input type="date" id="endDate" name="endDate" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>日程安排</label>
                    <div class="time-group">
                        <div class="time-row">
                            <span class="time-label">上午</span>
                            <div class="time-inputs">
                                <input type="time" id="morningStart" name="morningStart" value="09:00">
                                <span style="align-self: center; margin: 0 4px;">-</span>
                                <input type="time" id="morningEnd" name="morningEnd" value="12:00">
                            </div>
                        </div>
                        <div class="time-row">
                            <span class="time-label">下午</span>
                            <div class="time-inputs">
                                <input type="time" id="afternoonStart" name="afternoonStart" value="13:00">
                                <span style="align-self: center; margin: 0 4px;">-</span>
                                <input type="time" id="afternoonEnd" name="afternoonEnd" value="17:00">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>会议目的</label>
                    <input type="text" id="purpose" name="purpose" placeholder="请输入会议目的（可选）">
                </div>

                <div class="form-group">
                    <label>服务配置</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="hasMeal" name="hasMeal">
                            <label for="hasMeal">用餐</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="hasHotel" name="hasHotel">
                            <label for="hasHotel">住宿</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="hasTransport" name="hasTransport">
                            <label for="hasTransport">接送</label>
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary" id="submitBtn">创建会议</button>
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">清空</button>
                </div>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>创建中...</p>
            </div>

            <div class="result" id="result"></div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        function resetForm() {
            document.getElementById('conferenceForm').reset();
            hideResult();
        }

        function hideResult() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('result').style.display = 'none';
            document.getElementById('submitBtn').disabled = false;
        }

        function showResult(type, title, message) {
            hideResult();
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result ${type}`;
            resultDiv.innerHTML = `<h4>${title}</h4>${message}`;
            resultDiv.style.display = 'block';
        }

        function getChatId() {
            const urlParams = new URLSearchParams(window.location.search);
            let chatId = urlParams.get('chat_id') || urlParams.get('chatId') || urlParams.get('openConversationId');
            if (chatId) {
                try {
                    chatId = decodeURIComponent(chatId);
                    chatId = decodeURIComponent(chatId);
                } catch (e) {
                    console.log('解码chat_id失败:', e);
                }
            }
            return chatId || 'default_chat_id';
        }

        document.getElementById('conferenceForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);
            const startDate = formData.get('startDate');
            const endDate = formData.get('endDate');

            if (new Date(endDate) < new Date(startDate)) {
                showResult('error', '提交失败', '结束日期不能早于开始日期');
                return;
            }

            const morningStart = formData.get('morningStart');
            const morningEnd = formData.get('morningEnd');
            const afternoonStart = formData.get('afternoonStart');
            const afternoonEnd = formData.get('afternoonEnd');

            let schedule = '';
            if (startDate && endDate) {
                schedule = `${startDate} 至 ${endDate}`;
            }

            let timePart = '';
            if (morningStart && morningEnd) {
                timePart += `上午: ${morningStart}-${morningEnd}`;
            }
            if (afternoonStart && afternoonEnd) {
                if (timePart) timePart += ', ';
                timePart += `下午: ${afternoonStart}-${afternoonEnd}`;
            }
            if (timePart) {
                schedule += ' ' + timePart;
            }

            const data = {
                chat_id: getChatId(),
                title: formData.get('title'),
                scale: parseInt(formData.get('scale')),
                start_date: startDate,
                end_date: endDate,
                schedule: schedule || '待定',
                purpose: formData.get('purpose') || '',
                has_meal: formData.get('hasMeal') === 'on',
                has_hotel: formData.get('hasHotel') === 'on',
                has_transport: formData.get('hasTransport') === 'on'
            };

            document.getElementById('loading').style.display = 'block';
            document.getElementById('submitBtn').disabled = true;

            try {
                const response = await fetch(`${API_BASE}/api/conferences/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (response.ok) {
                    const infoHtml = `
                        <div style="text-align:left; margin-top:10px;">
                            <div class="info-row">
                                <span class="info-label">会议编码</span>
                                <span class="info-value">${result.code || '-'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">会议名称</span>
                                <span class="info-value">${result.title || '-'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">会议规模</span>
                                <span class="info-value">${result.scale || 0}人</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">会议日期</span>
                                <span class="info-value">${result.start_date || '-'} 至 ${result.end_date || '-'}</span>
                            </div>
                        </div>
                    `;
                    showResult('success', '创建成功', infoHtml);
                } else {
                    showResult('error', '创建失败', result.detail || result.message || '未知错误');
                }
            } catch (error) {
                showResult('error', '网络错误', `请求失败: ${error.message}`);
            }
        });
    </script>
</body>
</html>
